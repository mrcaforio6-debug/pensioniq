[[redirects]]
  from = "/api/claude"
  to = "https://api.anthropic.com/v1/messages"
  status = 200
  force = true
  [redirects.headers]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, x-api-key, anthropic-version"
    Access-Control-Allow-Methods = "POST, OPTIONS"
